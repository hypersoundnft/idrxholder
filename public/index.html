<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDRX Top Holders Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117; color: #e1e4e8; padding: 20px; min-height: 100vh;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
  }
  header h1 { font-size: 24px; font-weight: 700; color: #f0f6fc; }
  header h1 span { color: #58a6ff; }
  .header-meta { font-size: 13px; color: #8b949e; }
  .refresh-btn {
    background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
    padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: background .2s;
  }
  .refresh-btn:hover { background: #30363d; }
  .refresh-btn:disabled { opacity: .6; cursor: not-allowed; }

  /* ── Main combined table ─────────────────────────────── */
  .main-card {
    background: #161b22; border: 1px solid #30363d;
    border-radius: 10px; overflow: hidden; margin-bottom: 20px;
  }
  .main-card-header {
    padding: 16px 20px; font-size: 18px; font-weight: 700;
    border-bottom: 1px solid #30363d; display: flex;
    justify-content: space-between; align-items: center;
  }
  .main-card-header .badge {
    font-size: 12px; font-weight: 500; padding: 3px 10px;
    border-radius: 10px; background: #21262d; color: #8b949e;
  }
  .main-table { width: 100%; border-collapse: collapse; }
  .main-table th {
    text-align: left; font-size: 11px; font-weight: 600; color: #8b949e;
    padding: 10px 16px; text-transform: uppercase; letter-spacing: .5px;
    border-bottom: 1px solid #21262d;
  }
  .main-table td {
    padding: 10px 16px; font-size: 14px; border-bottom: 1px solid #21262d;
    vertical-align: middle;
  }
  .main-table tr:last-child td { border-bottom: none; }
  .main-table tr:hover td { background: rgba(88,166,255,0.04); }
  .main-table .rank-col { width: 36px; color: #8b949e; font-size: 12px; text-align: center; font-weight: 600; }
  .main-table .addr-col { font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; font-size: 13px; }
  .main-table .addr-col a { color: #58a6ff; text-decoration: none; }
  .main-table .addr-col a:hover { text-decoration: underline; }
  .main-table .bal-col { text-align: right; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; font-size: 14px; font-weight: 600; }
  .main-table .pct-col { text-align: right; font-size: 12px; color: #8b949e; white-space: nowrap; }
  .main-table .tags-col { max-width: 140px; }
  .main-table .loading-cell { text-align: center; padding: 48px; color: #8b949e; }

  /* chain tags */
  .chain-tag { display: inline-block; font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 4px; margin: 1px 2px; text-transform: uppercase; }
  .chain-tag.base    { background: #0052FF22; color: #5A8CFF; }
  .chain-tag.polygon { background: #8247E522; color: #A87AFF; }
  .chain-tag.bnb     { background: #F0B90B22; color: #F0D060; }
  .chain-tag.kaia    { background: #56447A22; color: #8A7AB0; }
  .chain-tag.lisk    { background: #2F68F822; color: #6A9AFF; }
  .chain-tag.solana  { background: #9945FF22; color: #BB7AFF; }

  .bar-wrap { display: inline-block; width: 80px; height: 5px; background: #21262d; border-radius: 3px; vertical-align: middle; margin-left: 6px; }
  .bar-fill { height: 100%; border-radius: 3px; background: #58a6ff; transition: width .3s; }

  /* ── Chain status bar ───────────────────────────────── */
  .status-bar {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .status-chip {
    padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
    border: 1px solid #30363d; background: #161b22;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; }
  .status-chip.ok .status-dot { background: #3fb950; }
  .status-chip.err .status-dot { background: #f85149; }
  .status-chip.warn .status-dot { background: #d29922; }

  footer { margin-top: 24px; text-align: center; font-size: 12px; color: #484f58; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-text { color: #f85149; font-size: 12px; }
  .no-data-text { color: #484f58; font-style: italic; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>IDRX <span>Top Holders</span></h1>
      <div class="header-meta">Aggregated across all chains · Last updated: <span id="updated">—</span></div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="refresh()">🔄 Refresh</button>
  </header>

  <div class="status-bar" id="statusBar"></div>
  <div class="main-card" id="combinedCard"></div>
  <footer>IDRX Dashboard — Blockscout, Solana RPC, Nodereal</footer>
</div>

<script>
const CHAINS = [
  { id: 'base',    name: 'Base',    color: '#0052FF' },
  { id: 'polygon', name: 'Polygon', color: '#8247E5' },
  { id: 'bnb',     name: 'BNB',     color: '#F0B90B' },
  { id: 'kaia',    name: 'Kaia',    color: '#56447A' },
  { id: 'lisk',    name: 'Lisk',    color: '#2F68F8' },
  { id: 'solana',  name: 'Solana',  color: '#9945FF' },
];
const CHAIN_LABELS = { base:'Base', polygon:'Polygon', bnb:'BNB', kaia:'Kaia', lisk:'Lisk', solana:'Solana' };

function truncate(a) { return a.length > 16 ? a.slice(0, 7) + '...' + a.slice(-5) : a; }

function formatBal(b) {
  const n = parseFloat(b.replace(/,/g, '') || b);
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(2) + 'K';
  if (n >= 1) return n.toLocaleString('en-US', { maximumFractionDigits: 2 });
  if (n > 0) return n.toFixed(2);
  return '0';
}

function renderCombinedTable(data) {
  const card = document.getElementById('combinedCard');
  const holders = data.holders;
  const err = data.error;

  if (err) {
    card.innerHTML = `<div class="main-card-header" style="border-left:3px solid #FF6B35"><span>Total (All Chains)</span></div><div class="main-table"><div class="loading-cell error-text">⚠ ${err.slice(0, 60)}</div></div>`;
    return;
  }

  if (!holders || holders.length === 0) {
    card.innerHTML = `<div class="main-card-header" style="border-left:3px solid #FF6B35"><span>Total (All Chains)</span></div><div class="main-table"><div class="loading-cell no-data-text">No holders found</div></div>`;
    return;
  }

  const maxBal = parseFloat(holders[0].raw || 1);
  const rows = holders.map((h, i) => {
    const pct = maxBal > 0 ? (parseFloat(h.raw) / maxBal) * 100 : 0;
    const tags = (h.chains || []).map(c => `<span class="chain-tag ${c}">${CHAIN_LABELS[c]}</span>`).join('');
    return `<tr>
      <td class="rank-col">#${i + 1}</td>
      <td class="addr-col">${truncate(h.address)}</td>
      <td class="tags-col">${tags}</td>
      <td class="bal-col">${formatBal(h.balance)}</td>
      <td class="pct-col">${(h.percentage || 0).toFixed(1)}% <span class="bar-wrap"><span class="bar-fill" style="width:${Math.min(pct, 100)}%"></span></span></td>
    </tr>`;
  }).join('');

  card.innerHTML = `<div class="main-card-header" style="border-left:3px solid #FF6B35"><span>Total (All Chains)</span><span class="badge">${holders.length} holders</span></div><table class="main-table"><thead><tr><th>#</th><th>Address</th><th>Chains</th><th style="text-align:right">Balance</th><th style="text-align:right">Share</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderStatusChips(raw) {
  const bar = document.getElementById('statusBar');
  bar.innerHTML = CHAINS.map(c => {
    const d = raw[c.id];
    if (!d) return `<div class="status-chip warn"><span class="status-dot"></span>${c.name}: —</div>`;
    if (d.error) return `<div class="status-chip err"><span class="status-dot"></span>${c.name}: ⚠</div>`;
    return `<div class="status-chip ok"><span class="status-dot" style="background:${c.color}"></span>${c.name}: ${d.holders.length} holders</div>`;
  }).join('');
}

async function refresh() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Loading…';
  document.getElementById('updated').textContent = 'fetching…';
  document.getElementById('combinedCard').innerHTML = '<div class="main-card-header" style="border-left:3px solid #FF6B35"><span>Total (All Chains)</span></div><div class="main-table"><div class="loading-cell"><span class="spinner"></span>Loading holders across all chains…</div></div>';
  document.getElementById('statusBar').innerHTML = CHAINS.map(c => `<div class="status-chip"><span class="status-dot"></span>${c.name}…</div>`).join('');

  try {
    const res = await fetch('/api/holders');
    const data = await res.json();
    renderStatusChips(data);
    renderCombinedTable(data.combined || { holders: [], error: 'No combined data' });
    document.getElementById('updated').textContent = new Date().toLocaleTimeString();
  } catch (err) {
    document.getElementById('updated').textContent = 'error';
    document.getElementById('combinedCard').innerHTML = '<div class="main-card-header" style="border-left:3px solid #FF6B35"><span>Total (All Chains)</span></div><div class="main-table"><div class="loading-cell error-text">Failed to load</div></div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '🔄 Refresh';
  }
}

refresh();
</script>
</body>
</html>
